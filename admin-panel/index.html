<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>پنل مدیریت | غزل کرمی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --must:#DFA02D;--must-d:#A87310;--must-l:#F3C766;--must-t:#FBEECB;
  --night:#0B1526;--night-2:#12203A;--night-3:#182A47;
  --bone:#FBF7EE;--bone-2:#F1E7CF;
  --line:#E3D5B2;--ink:#181207;--ink-2:#59481F;--danger:#C0392B;--success:#3A8A5A;
  --gline:rgba(223,160,45,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Vazirmatn',sans-serif;background:var(--night);color:var(--bone);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
.hidden{display:none !important;}
::selection{background:var(--must);color:var(--night);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--night);}
::-webkit-scrollbar-thumb{background:rgba(223,160,45,.35);border-radius:999px;border:2px solid var(--night);}
::-webkit-scrollbar-thumb:hover{background:var(--must);}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ---- login screen ---- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--night);padding:20px;
  background-image:radial-gradient(rgba(223,160,45,.08) 1px,transparent 1px);background-size:32px 32px;}
.login-card{background:var(--night-2);border:1px solid rgba(223,160,45,.25);border-radius:22px;padding:38px;width:100%;max-width:380px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.5);animation:fadeInUp .5s cubic-bezier(.2,.8,.3,1);}
.login-card h1{color:#fff;font-size:21px;margin-bottom:6px;text-align:center;font-weight:900;}
.login-card p{color:rgba(251,247,238,.55);font-size:13px;text-align:center;margin-bottom:26px;}
.login-card input{width:100%;padding:14px 16px;border-radius:13px;border:1.5px solid rgba(223,160,45,.3);
  background:rgba(255,255,255,.04);color:#fff;font-family:inherit;font-size:15px;margin-bottom:12px;transition:border-color .2s ease,background .2s ease;}
.login-card input::placeholder{color:rgba(251,247,238,.35);}
.login-card input:focus{outline:none;border-color:var(--must);background:rgba(255,255,255,.06);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;
  border-radius:999px;font-weight:700;font-size:14px;border:1.5px solid transparent;cursor:pointer;
  font-family:inherit;transition:transform .2s ease,box-shadow .2s ease,background .2s ease,border-color .2s ease,color .2s ease;}
.btn-gold{background:var(--must);color:var(--night);width:100%;}
.btn-gold:hover{background:var(--must-l);transform:translateY(-1px);box-shadow:0 10px 22px -10px rgba(223,160,45,.55);}
.btn-line{border-color:rgba(223,160,45,.45);color:var(--must-l);background:transparent;}
.btn-line:hover{border-color:var(--must);background:rgba(223,160,45,.08);}
.btn-danger{background:rgba(192,57,43,.14);color:#FF9A90;border-color:rgba(192,57,43,.3);}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(251,247,238,.75);}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff;}
.btn-sm{padding:9px 15px;font-size:12.5px;width:auto;}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.err-msg{color:#ff8a80;font-size:13px;text-align:center;margin-top:10px;min-height:16px;}

/* ---- app shell ---- */
#app{display:none;min-height:100vh;}
#app.on{display:flex;}
.sidebar{width:252px;flex-shrink:0;background:var(--night-2);color:#fff;min-height:100vh;padding:26px 0;overflow-y:auto;
  border-left:1px solid var(--gline);position:sticky;top:0;align-self:flex-start;height:100vh;}
.sidebar h2{padding:0 24px 18px;font-size:17px;color:var(--must-l);font-weight:900;border-bottom:1px solid var(--gline);margin-bottom:8px;
  display:flex;align-items:center;gap:9px;}
.sidebar h2::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--must);box-shadow:0 0 10px 1px rgba(223,160,45,.6);}
.sidebar .group-label{padding:18px 24px 8px;font-size:10.5px;color:rgba(251,247,238,.35);letter-spacing:.08em;}
.sidebar button{display:flex;align-items:center;gap:11px;width:100%;text-align:right;padding:12px 24px;
  background:none;border:none;color:rgba(251,247,238,.68);font-family:inherit;font-size:13.5px;cursor:pointer;
  border-right:3px solid transparent;transition:background .2s ease,color .2s ease,border-color .2s ease;}
.sidebar button:hover{background:rgba(223,160,45,.08);color:#fff;}
.sidebar button.on{background:rgba(223,160,45,.13);color:var(--must-l);border-right-color:var(--must);font-weight:700;}
.sidebar .logout{margin-top:20px;color:rgba(251,247,238,.4);}
.sidebar .logout:hover{background:rgba(192,57,43,.1);color:#ff8a80;}
main{flex:1;padding:38px 42px;max-width:1280px;}
main h1{font-size:23px;margin-bottom:26px;color:#fff;font-weight:900;letter-spacing:-.01em;}
main h3{font-size:15px;margin-bottom:14px;color:#fff;}
#mainContent{animation:fadeInUp .35s cubic-bezier(.2,.8,.3,1);}
.card{background:var(--night-2);border:1px solid var(--gline);border-radius:18px;padding:24px;margin-bottom:18px;
  transition:border-color .2s ease;}
.card:hover{border-color:rgba(223,160,45,.26);}
.section-title{font-size:12.5px;color:var(--must-l);font-weight:700;margin:30px 0 14px;letter-spacing:.04em;}
.section-title:first-child{margin-top:0;}
.row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.row + .row{margin-top:14px;padding-top:14px;border-top:1px solid var(--gline);}
.muted{color:rgba(251,247,238,.55);font-size:13px;}
.tag{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;}
.tag-open{background:rgba(58,138,90,.18);color:#7FD9A4;}
.tag-closed{background:rgba(192,57,43,.18);color:#FF9A90;}
.tag-pending{background:rgba(223,160,45,.2);color:var(--must-l);}
.tag-muted{background:rgba(255,255,255,.07);color:rgba(251,247,238,.55);}
input[type=text],input[type=number],input[type=date],input[type=time],input[type=tel],select{
  padding:10px 13px;border-radius:10px;border:1.5px solid var(--gline);
  font-family:inherit;font-size:13.5px;width:130px;background:rgba(255,255,255,.04);color:#fff;
  transition:border-color .2s ease,background .2s ease;}
input::placeholder{color:rgba(251,247,238,.35);}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,input[type=time]:focus,input[type=tel]:focus,select:focus{
  outline:none;border-color:var(--must);background:rgba(255,255,255,.06);}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.85);cursor:pointer;}
select option{background:var(--night-2);color:#fff;}
input[type=text].wide,input[type=tel].wide{width:240px;}
label.field{display:flex;flex-direction:column;gap:6px;font-size:12px;color:rgba(251,247,238,.6);}
.form-grid{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.14);border-radius:999px;transition:.2s;}
.slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked + .slider{background:var(--must);}
input:checked + .slider::before{transform:translateX(-20px);}
.grid-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
.gimg{border:1.5px solid var(--gline);border-radius:13px;overflow:hidden;position:relative;background:rgba(255,255,255,.03);
  transition:border-color .2s ease,transform .2s ease;}
.gimg:hover{border-color:rgba(223,160,45,.35);transform:translateY(-2px);}
.gimg img{width:100%;height:140px;object-fit:cover;display:block;}
.gimg .meta{padding:9px;font-size:11.5px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.gimg select{font-family:inherit;font-size:11px;padding:3px;border-radius:6px;width:auto;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--night-2);color:#fff;
  border:1px solid rgba(223,160,45,.3);padding:13px 24px;border-radius:999px;font-size:13.5px;opacity:0;pointer-events:none;
  transition:opacity .25s ease,transform .25s ease;z-index:200;max-width:90vw;text-align:center;box-shadow:0 20px 40px -12px rgba(0,0,0,.5);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-8px);}
.loading{color:rgba(251,247,238,.5);font-size:13.5px;padding:20px 0;}
textarea{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--gline);font-family:inherit;font-size:13.5px;
  resize:vertical;background:rgba(255,255,255,.04);color:#fff;transition:border-color .2s ease;}
textarea:focus{outline:none;border-color:var(--must);}
.upload-btn{display:inline-block;padding:10px 18px;border-radius:999px;border:1.5px dashed rgba(223,160,45,.5);
  color:var(--must-l);font-size:13px;cursor:pointer;transition:background .2s ease,border-color .2s ease;}
.upload-btn:hover{background:rgba(223,160,45,.08);border-color:var(--must);}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{padding:8px 15px;border-radius:999px;border:1.5px solid var(--gline);background:rgba(255,255,255,.03);color:rgba(251,247,238,.6);
  font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.chip.on{background:var(--must);color:var(--night);border-color:var(--must);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.simple{width:100%;border-collapse:collapse;font-size:13px;min-width:480px;}
table.simple th{text-align:right;color:rgba(251,247,238,.5);font-weight:700;font-size:12px;padding:9px 6px;border-bottom:1.5px solid var(--gline);}
table.simple td{padding:9px 6px;border-bottom:1px solid var(--gline);}
.slot-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;border:1.5px solid var(--gline);font-size:12px;margin:3px;
  background:rgba(255,255,255,.03);}
.slot-pill.off{opacity:.4;text-decoration:line-through;}
.slot-pill button{background:none;border:none;cursor:pointer;color:#FF9A90;font-size:13px;padding:0;line-height:1;}

/* ---- dashboard ---- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px;}
.stat-tile{background:var(--night-2);border:1px solid var(--gline);border-radius:16px;padding:20px;
  transition:border-color .2s ease,transform .2s ease;}
.stat-tile:hover{border-color:rgba(223,160,45,.32);transform:translateY(-2px);}
.stat-tile .n{font-size:28px;font-weight:900;color:var(--must-l);display:block;line-height:1.25;}
.stat-tile .l{font-size:12px;color:rgba(251,247,238,.55);margin-top:5px;}
.stat-tile .rev{font-size:12.5px;color:rgba(251,247,238,.7);margin-top:8px;padding-top:8px;border-top:1px solid var(--gline);}
.stat-tile .rev b{color:#7FD9A4;font-weight:700;}
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:150px;padding:6px 4px 0;}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
.chart-bar{width:100%;max-width:36px;background:linear-gradient(180deg,var(--must-l),var(--must-d));
  border-radius:8px 8px 3px 3px;transition:height .6s cubic-bezier(.2,.8,.3,1);min-height:4px;}
.chart-bar-col .lbl{font-size:11px;color:rgba(251,247,238,.5);}
.chart-bar-col .cnt{font-size:12px;color:var(--must-l);font-weight:700;}
.popular-list{display:flex;flex-direction:column;gap:12px;}
.popular-row{display:flex;align-items:center;gap:12px;}
.popular-row .bar-bg{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;}
.popular-row .bar-fill{height:100%;background:linear-gradient(90deg,var(--must-d),var(--must-l));border-radius:999px;transition:width .7s cubic-bezier(.2,.8,.3,1);}
.popular-row .name{width:140px;flex-shrink:0;font-size:13px;color:#fff;}
.popular-row .count{width:26px;flex-shrink:0;text-align:left;font-size:12.5px;color:var(--must-l);font-weight:700;}
.recent-row{padding:16px 20px;margin-bottom:10px;}

@media(max-width:760px){
  #app.on{flex-direction:column;}
  .sidebar{width:100%;display:flex;overflow-x:auto;padding:12px 0;min-height:auto;height:auto;position:sticky;top:0;z-index:50;}
  .sidebar h2,.sidebar .logout,.sidebar .group-label{display:none;}
  .sidebar button{white-space:nowrap;border-right:none;border-bottom:3px solid transparent;padding:12px 16px;}
  .sidebar button.on{border-bottom-color:var(--must);}
  main{padding:20px 16px;}
  main h1{font-size:19px;margin-bottom:20px;}
  .card{padding:18px;border-radius:14px;}
  .form-grid{gap:12px;}
  input[type=text],input[type=number],input[type=date],input[type=time],input[type=tel],select{width:100%;}
  input[type=text].wide,input[type=tel].wide{width:100%;}
  .stat-tile .n{font-size:24px;}
  .popular-row .name{width:100px;font-size:12.5px;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>پنل مدیریت غزل کرمی</h1>
    <p>ورود مخصوص مدیر سالن</p>
    <input type="text" id="loginPhone" placeholder="شماره موبایل" autocomplete="username">
    <input type="password" id="loginPass" placeholder="رمز عبور" autocomplete="current-password">
    <button class="btn btn-gold" onclick="doLogin()">ورود</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <h2>غزل کرمی</h2>
    <button data-tab="dashboard" class="on">داشبورد</button>
    <div class="group-label">رزرو و زمان‌بندی</div>
    <button data-tab="schedule">زمان‌بندی سالن</button>
    <button data-tab="bookings">رزروها</button>
    <div class="group-label">محتوای سایت</div>
    <button data-tab="prices">قیمت‌ها</button>
    <button data-tab="gallery">گالری</button>
    <button data-tab="reviews">نظرات</button>
    <button data-tab="siteContent">متن‌های سایت</button>
    <div class="group-label">کسب‌وکار</div>
    <button data-tab="services">خدمات</button>
    <button data-tab="customers">مشتریان</button>
    <button data-tab="classes">درخواست کلاس</button>
    <div class="group-label">تنظیمات</div>
    <button data-tab="contact">اطلاعات تماس</button>
    <button data-tab="smsLogs">پیامک‌ها</button>
    <button data-tab="settings">تنظیمات کلی</button>
    <button class="logout" onclick="logout()">خروج</button>
  </nav>
  <main id="mainContent"></main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "/api";
let TOKEN = localStorage.getItem("gk_admin_token") || "";

function toast(msg, isErr){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=isErr?"var(--danger)":"var(--night)";
  t.classList.add("on");
  setTimeout(()=>t.classList.remove("on"),2800);
}
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function toman(n){ return Number(n||0).toLocaleString("fa-IR")+" تومان"; }

/* every tab render goes through this instead of a raw innerHTML assignment,
   so switching tabs gets a consistent subtle fade instead of an abrupt swap */
function setMainContent(html){
  const el=document.getElementById("mainContent");
  el.innerHTML=html;
  el.style.animation='none';
  void el.offsetWidth; /* force reflow so the animation restarts every time */
  el.style.animation='fadeInUp .35s cubic-bezier(.2,.8,.3,1)';
}

/* prevents a create-type button from firing a second overlapping request if
   double-clicked (or clicked again before the toast/re-render from the first
   click lands) — some of these actions (manual reviews, social links) have
   no database uniqueness constraint backing them, so a double-submit there
   would genuinely create a duplicate row, not just show a confusing error */
function withSubmitGuard(fn){
  return async function(...args){
    const btn = typeof event!=="undefined" && event && event.target ? event.target.closest("button") : null;
    if(btn){ if(btn.dataset.busy==="1") return; btn.dataset.busy="1"; btn.disabled=true; }
    try{ await fn.apply(this,args); }
    finally{ if(btn){ btn.dataset.busy=""; btn.disabled=false; } }
  };
}

async function api(path, opts={}){
  const isForm = opts.body instanceof FormData;
  const res = await fetch(API+path, {
    ...opts,
    headers:{
      ...(isForm?{}:{"Content-Type":"application/json"}),
      ...(TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}),
      ...(opts.headers||{}),
    },
  });
  if(res.status===401){ logout(); throw new Error("نشست منقضی شده."); }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||"خطایی رخ داد.");
  return data;
}

async function doLogin(){
  const phone=document.getElementById("loginPhone").value.trim();
  const password=document.getElementById("loginPass").value;
  const errEl=document.getElementById("loginErr");
  errEl.textContent="";
  try{
    const res=await fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone,password})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||"ورود ناموفق بود.");
    if(data.user.role!=="ADMIN") throw new Error("این حساب دسترسی مدیریت ندارد.");
    TOKEN=data.token;
    localStorage.setItem("gk_admin_token",TOKEN);
    boot();
  }catch(e){ errEl.textContent=e.message; }
}
function logout(){
  TOKEN=""; localStorage.removeItem("gk_admin_token");
  document.getElementById("app").classList.remove("on");
  document.getElementById("loginScreen").style.display="flex";
}

const DOW_NAMES=["یکشنبه","دوشنبه","سه‌شنبه","چهارشنبه","پنج‌شنبه","جمعه","شنبه"];
const tabs={};

/* =====================================================================
   داشبورد: آمار واقعی از /admin/dashboard — هیچ عددی اینجا ساختگی نیست
   ===================================================================== */
tabs.dashboard = async () => {
  const d = await api("/admin/dashboard");
  let html = `<h1>داشبورد</h1>`;

  html += `<div class="stat-grid">
    <div class="stat-tile"><span class="n">${d.today.count}</span><div class="l">رزرو امروز</div>
      <div class="rev">بیعانه‌ی دریافتی: <b>${toman(d.today.revenue)}</b></div></div>
    <div class="stat-tile"><span class="n">${d.week.count}</span><div class="l">رزرو این هفته</div>
      <div class="rev">بیعانه‌ی دریافتی: <b>${toman(d.week.revenue)}</b></div></div>
    <div class="stat-tile"><span class="n">${d.month.count}</span><div class="l">رزرو این ماه</div>
      <div class="rev">بیعانه‌ی دریافتی: <b>${toman(d.month.revenue)}</b></div></div>
    <div class="stat-tile"><span class="n" style="font-size:18px;">${d.popularServices[0]?esc(d.popularServices[0].name):'—'}</span><div class="l">محبوب‌ترین سرویس</div></div>
  </div>
  <p class="muted" style="margin:-6px 0 18px;">درآمد فقط شامل بیعانه‌های واقعاً پرداخت‌شده از طریق زرین‌پال است؛ نوبت‌های ثبت‌دستی/حضوری در این عدد حساب نمی‌شوند.</p>`;

  const maxDay = Math.max(1, ...d.last7Days.map(x=>x.count));
  html += `<div class="section-title">رزروهای ۷ روز گذشته</div><div class="card">
    <div class="chart-wrap">
      ${d.last7Days.map(x=>`
        <div class="chart-bar-col">
          <span class="cnt">${x.count}</span>
          <div class="chart-bar" style="height:${Math.max(4,(x.count/maxDay)*100)}%;"></div>
          <span class="lbl">${DOW_NAMES[x.dayOfWeek]}</span>
        </div>`).join("")}
    </div>
  </div>`;

  html += `<div class="section-title">محبوب‌ترین خدمات</div><div class="card">`;
  if(!d.popularServices.length){
    html += `<p class="muted">هنوز رزروی ثبت نشده.</p>`;
  } else {
    const maxPop = Math.max(1, ...d.popularServices.map(s=>s.count));
    html += `<div class="popular-list">` + d.popularServices.map(s=>`
      <div class="popular-row">
        <span class="name">${esc(s.name)}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${(s.count/maxPop)*100}%;"></div></div>
        <span class="count">${s.count}</span>
      </div>`).join("") + `</div>`;
  }
  html += `</div>`;

   ===================================================================== */
tabs.schedule = async () => {

  html += `<div class="section-title">استثنا روی یک تاریخ خاص (باز کردن یه روز تعطیل، یا بستن یه روز عادی)</div><div class="card">
    <div class="form-grid">
      <label class="field">تاریخ<input type="date" id="exDate"></label>
      <label class="field">وضعیت<select id="exOpen" onchange="renderExHoursVisibility()"><option value="true">باز</option><option value="false">تعطیل</option></select></label>
      <label class="field">دلیل (اختیاری)<input type="text" class="wide" id="exReason" placeholder="مثلاً باز کردن ویژه"></label>

    </div>

    </div>
    <div style="margin-top:16px;">
      ${exceptions.length? exceptions.map(e=>`
        <div class="row">
          <div>${e.date.slice(0,10)} — <span class="tag ${e.isOpen?'tag-open':'tag-closed'}">${e.isOpen?'باز':'تعطیل'}</span>

            ${e.reason? '— '+esc(e.reason):''}</div>
          <button class="btn btn-ghost btn-sm" onclick="deleteDayException('${e.id}')">حذف</button>
        </div>`).join("") : '<p class="muted">استثنایی ثبت نشده.</p>'}
    </div>
  </div>`;

  html += `<div class="section-title">تعطیلی موقت (بستن چند روز پشت‌سرهم — مرخصی، بیماری)</div><div class="card">
    <div class="form-grid">
      <label class="field">از تاریخ<input type="date" id="closureStart"></label>

      <label class="field">دلیل (اختیاری)<input type="text" class="wide" id="closureReason" placeholder="مثلاً مرخصی"></label>
      <button class="btn btn-danger btn-sm" onclick="addClosureRange()">بستن این بازه</button>
    </div>
  </div>`;

  html += `<div class="section-title">اسلات‌های رزرو هر سرویس</div><div class="card">
    <div class="form-grid" style="margin-bottom:18px;">

      </select></label>
      <label class="field">روز هفته<select id="slotDow" onchange="renderSlotDay()">
        ${DOW_NAMES.map((n,i)=>`<option value="${i}">${n}</option>`).join("")}

/* custom hours only make sense when the exception marks the day open — no
   point asking for a start/end time on a day being closed entirely */
function renderExHoursVisibility(){
  const row=document.getElementById("exHoursRow");
  const isOpen=document.getElementById("exOpen")?.value!=="false";
  if(row) row.style.display=isOpen?"flex":"none";
}
window.renderExHoursVisibility = renderExHoursVisibility;

window.toggleDay = async (dayOfWeek, isOpen) => {
  try{ await api(`/admin/working-days/${dayOfWeek}`,{method:"PATCH",body:JSON.stringify({isOpen})}); toast("ذخیره شد."); }
  catch(e){ toast(e.message,true); }
};
window.updateDayHours = async (dayOfWeek, field, value) => {
  try{ await api(`/admin/working-days/${dayOfWeek}`,{method:"PATCH",body:JSON.stringify({[field]:value})}); toast("ذخیره شد."); }
  catch(e){ toast(e.message,true); }
};
window.addDayException = withSubmitGuard(async () => {
  const date=document.getElementById("exDate").value;
  if(!date) return toast("تاریخ را انتخاب کنید.",true);
  const isOpen=document.getElementById("exOpen").value==="true";
  const reason=document.getElementById("exReason").value.trim()||null;
  // only meaningful when the day is open — a closed day has no hours to set
  const openTime=isOpen?(document.getElementById("exOpenTime").value||null):null;
  const closeTime=isOpen?(document.getElementById("exCloseTime").value||null):null;
  try{ await api("/admin/day-exceptions",{method:"POST",body:JSON.stringify({date,isOpen,openTime,closeTime,reason})}); toast("استثنا ثبت شد."); tabs.schedule(); }
  catch(e){ toast(e.message,true); }
});
window.deleteDayException = async (id) => {
  try{ await api(`/admin/day-exceptions/${id}`,{method:"DELETE"}); toast("حذف شد."); tabs.schedule(); }
  catch(e){ toast(e.message,true); }
};
window.addClosureRange = withSubmitGuard(async () => {
  const startDate=document.getElementById("closureStart").value;
  const endDate=document.getElementById("closureEnd").value;
  if(!startDate||!endDate) return toast("بازه‌ی تاریخ را کامل کنید.",true);
  const reason=document.getElementById("closureReason").value.trim()||null;
  try{
    const r=await api("/admin/day-exceptions/closure-range",{method:"POST",body:JSON.stringify({startDate,endDate,reason})});
    toast(`${r.exceptions.length} روز بسته شد.`);
    tabs.schedule();
  }catch(e){ toast(e.message,true); }
});

function renderSlotDay(){
  const catId=document.getElementById("slotCat").value;
  const dow=Number(document.getElementById("slotDow").value);
  const category=(window._scheduleCategories||[]).find(c=>c.id===catId);
  const list=document.getElementById("slotDayList");
  if(!category){ list.innerHTML=""; return; }
  const slots=category.timeSlots.filter(s=>s.dayOfWeek===dow).sort((a,b)=>a.time.localeCompare(b.time));
  if(!slots.length){ list.innerHTML='<p class="muted">هنوز اسلاتی برای این روز/دسته ثبت نشده.</p>'; return; }
  list.innerHTML = slots.map(s=>`
    <span class="slot-pill ${s.isActive?'':'off'}">
      ${s.time}
      <button title="${s.isActive?'غیرفعال کردن':'فعال کردن'}" aria-label="${s.isActive?'غیرفعال کردن':'فعال کردن'}" onclick="toggleSlot('${s.id}', ${!s.isActive})">${s.isActive?'⏸':'▶'}</button>
      <button title="حذف" aria-label="حذف این اسلات" onclick="deleteSlot('${s.id}')">✕</button>
    </span>`).join("");
}
window.renderSlotDay = renderSlotDay;
/* re-fetches just the categories/timeSlots data and redraws the slot list —
   keeps whatever category/day the admin currently has selected, unlike a
   full tabs.schedule() reload which would reset those dropdowns */
async function refreshScheduleSlots(){
  const {categories} = await api("/admin/categories");
  window._scheduleCategories = categories;
  renderSlotDay();
}
window.toggleSlot = async (id, isActive) => {
  try{ await api(`/admin/time-slots/${id}`,{method:"PATCH",body:JSON.stringify({isActive})}); await refreshScheduleSlots(); }
  catch(e){ toast(e.message,true); }
};
window.deleteSlot = async (id) => {
  if(!confirm("این اسلات حذف شود؟")) return;
  try{ await api(`/admin/time-slots/${id}`,{method:"DELETE"}); toast("حذف شد."); await refreshScheduleSlots(); }
  catch(e){ toast(e.message,true); }
};
window.generateSlots = withSubmitGuard(async () => {
  const categoryId=document.getElementById("slotCat").value;
  const dayOfWeek=Number(document.getElementById("slotDow").value);
  const startTime=document.getElementById("genStart").value;
  const endTime=document.getElementById("genEnd").value;
  const durationMin=Number(document.getElementById("genDuration").value);
  const gapMin=Number(document.getElementById("genGap").value)||0;
  try{
    const r=await api("/admin/time-slots/generate",{method:"POST",body:JSON.stringify({categoryId,dayOfWeek,startTime,endTime,durationMin,gapMin})});
    toast(`${r.slots.length} اسلات ساخته/به‌روزرسانی شد.`);
    await refreshScheduleSlots();
  }catch(e){ toast(e.message,true); }
});

          <button class="btn btn-ghost btn-sm" style="padding:6px 10px;" onclick="moveGalleryImage('${img.id}','down')" ${idx===images.length-1?"disabled":""} title="جابه‌جایی به پایین" aria-label="جابه‌جایی این عکس به پایین">↓</button>
          <label class="switch" style="width:34px;height:19px;"><input type="checkbox" ${img.active?"checked":""} onchange="updateGalleryField('${img.id}','active',this.checked)"><span class="slider"></span></label>

window.moveGalleryImage = async (id, direction) => {
  const images = (window._galleryImages||[]).slice();
  const idx = images.findIndex(i=>i.id===id);
  const swapWith = direction==="up" ? idx-1 : idx+1;
  if(idx<0 || swapWith<0 || swapWith>=images.length) return;
  [images[idx], images[swapWith]] = [images[swapWith], images[idx]];
  try{
    // renumbers the whole list sequentially rather than swapping raw
    // sortOrder values — every image currently uploads with sortOrder 0
    // (nothing has set it before now), so a plain value-swap between two
    // tied items would do nothing; a full renumber is correct either way
    await Promise.all(images.map((img,i)=>api(`/admin/gallery/${img.id}`,{method:"PATCH",body:JSON.stringify({sortOrder:i})})));
    tabs.gallery();
  }catch(e){ toast(e.message,true); }
};
window.uploadImage = async (input) => {
  const file = input.files[0];
  if(!file) return;
  if(input.disabled) return; // already uploading — the change event can't normally re-fire mid-upload, but guard anyway
  input.disabled = true;
  try{
    const fd = new FormData(); fd.append("file", file);
    const data = await api("/admin/upload", { method:"POST", body: fd });
    await api("/admin/gallery",{method:"POST",body:JSON.stringify({url:data.url,category:"haircut"})});
    toast("عکس اضافه شد.");
    tabs.gallery(); // re-renders the tab, which recreates (and re-enables) this input
  }catch(e){ toast(e.message,true); input.disabled = false; input.value = ""; }
};
window.updateGalleryField = async (id, field, value) => {
  try{ await api(`/admin/gallery/${id}`,{method:"PATCH",body:JSON.stringify({[field]:value})}); toast("ذخیره شد."); }

window.uploadSiteImage = async (input, key) => {
  const file = input.files[0];
  if(!file) return;
  if(input.disabled) return;
  input.disabled = true;
  try{
    const fd = new FormData(); fd.append("file", file);
    const data = await api("/admin/upload", { method:"POST", body: fd });
    await api(`/admin/site-content/${key}`,{method:"PATCH",body:JSON.stringify({value:data.url})});
    toast("عکس به‌روزرسانی شد.");
    tabs.siteContent(); // re-renders the tab, which recreates (and re-enables) this input
  }catch(e){ toast(e.message,true); input.disabled = false; input.value = ""; }
};

    const tag = l.status==="SUCCESS"?"tag-open":l.status==="FAILED"?"tag-closed":"tag-muted";
    const statusFa = l.status==="SUCCESS"?"موفق":l.status==="FAILED"?"ناموفق":"حالت آزمایشی (بدون ارسال واقعی)";
    html += `<tr><td>${l.phone}</td><td>${SMS_TYPE_FA[l.type]||l.type}</td><td><span class="tag ${tag}">${statusFa}</span></td><td>${new Date(l.createdAt).toLocaleString("fa-IR")}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  setMainContent(html);
};

/* =====================================================================
   تنظیمات کلی
   ===================================================================== */
tabs.settings = async () => {
  const {settings} = await api("/admin/settings");
  let html = `<h1>تنظیمات کلی</h1><div class="card">
    <div class="form-grid">
      <label class="field">یادآوری چند ساعت قبل از نوبت ارسال شود؟<input type="number" value="${settings.reminderHoursBefore}" onchange="updateSettings('reminderHoursBefore',Number(this.value))" style="width:100px;"></label>
    </div>
    <div class="form-grid" style="margin-top:16px;">
      <label class="field">نوع بیعانه‌ی پیش‌فرض (وقتی سرویسی مقدار خاص خودش را ندارد)<select onchange="updateSettings('defaultDepositType',this.value)">
        <option value="FIXED" ${settings.defaultDepositType==='FIXED'?'selected':''}>مبلغ ثابت</option>
        <option value="PERCENT" ${settings.defaultDepositType==='PERCENT'?'selected':''}>درصدی</option>
      </select></label>
      <label class="field">مقدار پیش‌فرض<input type="number" value="${settings.defaultDepositValue}" onchange="updateSettings('defaultDepositValue',Number(this.value))" style="width:120px;"></label>
    </div>
  </div>`;
  setMainContent(html);
};
window.updateSettings = async (field, value) => {
  try{ await api("/admin/settings",{method:"PATCH",body:JSON.stringify({[field]:value})}); toast("ذخیره شد."); }
  catch(e){ toast(e.message,true); }
};

/* ---------------- shell ---------------- */
document.querySelectorAll(".sidebar button[data-tab]").forEach(btn=>{
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sidebar button[data-tab]").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    document.getElementById("mainContent").innerHTML = `<div class="loading">در حال بارگذاری…</div>`;
    tabs[btn.dataset.tab]().catch(e=>toast(e.message,true));
  });
});

async function boot(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").classList.add("on");
  document.getElementById("mainContent").innerHTML = `<div class="loading">در حال بارگذاری…</div>`;
  try{ await tabs.dashboard(); }catch(e){ toast(e.message,true); }
}

if(TOKEN) boot();
</script>
